apiVersion: 1

# See documentation for more examples:
# https://grafana.com/docs/grafana/latest/datasources/google-cloud-monitoring/configure/#provision-the-data-source

datasources:
  - name: Google Cloud Monitoring
    uid: cloudmonitoring-e2e
    type: stackdriver
    access: proxy
    isDefault: true
    orgId: 1
    version: 1
    editable: true
    jsonData:
      authenticationType: 'jwt'
      defaultProject: 'example-project-id'
      clientEmail: 'example-account@example-project-id.iam.gserviceaccount.com'
      tokenUri: 'https://oauth2.googleapis.com/token'
      universeDomain: 'googleapis.com'
      # usingImpersonation: true
      # serviceAccountToImpersonate: 'example-account@example-project-id.iam.gserviceaccount.com'
      # privateKeyPath: '/etc/secrets/gce.pem'
    secureJsonData:
      # privateKey: |
      #   -----BEGIN PRIVATE KEY-----
      #   ...
      #   -----END PRIVATE KEY-----
