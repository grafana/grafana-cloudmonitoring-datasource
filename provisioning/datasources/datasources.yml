apiVersion: 1

datasources:
  - name: Google Cloud Monitoring
    uid: cloudmonitoring-e2e
    type: stackdriver
    access: proxy
    isDefault: true
    orgId: 1
    version: 1
    editable: true
    jsonData:
      authenticationType: 'jwt'
      defaultProject: 'example-project-id'
      clientEmail: 'example-account@example-project-id.iam.gserviceaccount.com'
      tokenUri: 'https://oauth2.googleapis.com/token'
      universeDomain: 'googleapis.com'
    secureJsonData: {}
